<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PassGuard — Password Strength Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0eeff;
    --muted: #7a7a9a;
    --accent: #7c6fff;
    --accent2: #b8acff;
    --red: #ff5a5a;
    --amber: #ffb547;
    --green: #4dffb0;
    --teal: #2dffd6;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,111,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,111,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial glow */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(124,111,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeDown 0.6s ease both;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), #4d9eff);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 20px; height: 20px; }

  .logo-text {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text);
  }

  .logo-text span { color: var(--accent); }

  h1 {
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 0.75rem;
  }

  h1 em {
    font-style: normal;
    background: linear-gradient(90deg, var(--accent2), var(--teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--muted);
    font-weight: 400;
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
  }

  /* Main card */
  .card {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 2rem;
    animation: fadeUp 0.7s ease 0.1s both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  /* Input section */
  .input-wrap {
    position: relative;
    margin-bottom: 1.5rem;
  }

  .input-label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    font-family: var(--font-mono);
  }

  .input-field {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 3.5rem 1rem 1.25rem;
    font-size: 1.05rem;
    font-family: var(--font-mono);
    color: var(--text);
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    letter-spacing: 0.08em;
  }

  .input-field::placeholder { color: var(--muted); letter-spacing: 0.02em; }
  .input-field:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,111,255,0.15);
  }

  .eye-btn {
    position: absolute;
    right: 14px;
    bottom: 14px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: var(--accent2); }
  .eye-btn svg { width: 18px; height: 18px; }

  /* Strength bar */
  .bar-section { margin-bottom: 1.5rem; }

  .bar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.6rem;
  }

  .strength-label {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    transition: color 0.3s;
    color: var(--muted);
  }

  .bit-label {
    font-size: 0.72rem;
    font-family: var(--font-mono);
    color: var(--muted);
  }

  .bar-track {
    display: flex;
    gap: 5px;
    height: 6px;
    border-radius: 99px;
    overflow: visible;
  }

  .bar-seg {
    flex: 1;
    border-radius: 99px;
    background: var(--surface2);
    transition: background 0.4s ease, transform 0.2s ease;
  }

  .bar-seg.lit { transform: scaleY(1.3); }


  /* Criteria */
  .criteria-title {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    font-family: var(--font-mono);
    margin-bottom: 0.75rem;
  }

  .criteria-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
    margin-bottom: 1.5rem;
  }

  .crit {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    color: var(--muted);
    transition: color 0.25s;
    font-family: var(--font-mono);
  }

  .crit-check {
    width: 18px;
    height: 18px;
    border-radius: 6px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.25s, border-color 0.25s;
    background: var(--surface2);
  }

  .crit-check svg { width: 10px; height: 10px; opacity: 0; transition: opacity 0.2s; }

  .crit.pass { color: var(--text); }
  .crit.pass .crit-check {
    background: rgba(77,255,176,0.15);
    border-color: var(--green);
  }
  .crit.pass .crit-check svg { opacity: 1; }

  /* Tip */
  .tip {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 12px 16px;
    font-size: 0.83rem;
    color: var(--muted);
    font-family: var(--font-mono);
    transition: border-color 0.4s, color 0.4s;
    line-height: 1.5;
  }

  /* Generate button */
  .gen-btn {
    width: 100%;
    margin-top: 1.25rem;
    padding: 13px;
    background: linear-gradient(135deg, rgba(124,111,255,0.15), rgba(77,255,176,0.1));
    border: 1px solid var(--border2);
    border-radius: 14px;
    color: var(--accent2);
    font-family: var(--font-display);
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .gen-btn:hover {
    background: linear-gradient(135deg, rgba(124,111,255,0.25), rgba(77,255,176,0.18));
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .gen-btn:active { transform: translateY(0); }
  .gen-btn svg { width: 16px; height: 16px; }

  /* Footer */
  .footer {
    margin-top: 2.5rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: var(--font-mono);
    animation: fadeUp 0.8s ease 0.3s both;
  }

  .footer span { color: var(--accent2); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .criteria-grid { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: 1fr 1fr; }
    h1 { font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="9" width="12" height="9" rx="2.5" stroke="white" stroke-width="1.6"/>
          <path d="M7 9V6.5a3 3 0 016 0V9" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="10" cy="13.5" r="1.5" fill="white"/>
        </svg>
      </div>
      <span class="logo-text">Pass<span>Guard</span></span>
    </div>
    <h1>How strong is<br/>your <em>password?</em></h1>
    <p class="subtitle">// Real-time analysis &amp; entropy scoring</p>
  </header>

  <div class="card">
    <!-- Input -->
    <div class="input-wrap">
      <label class="input-label" for="pwd">Enter password</label>
      <input class="input-field" type="password" id="pwd" placeholder="Type or paste a password…" autocomplete="off" spellcheck="false" />
      <button class="eye-btn" id="eyeBtn" aria-label="Toggle visibility">
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <!-- Strength bar -->
    <div class="bar-section">
      <div class="bar-header">
        <span class="strength-label" id="strLabel">Waiting…</span>
        <span class="bit-label" id="bitLabel">0 bits entropy</span>
      </div>
      <div class="bar-track" id="barTrack">
        <div class="bar-seg" id="b0"></div>
        <div class="bar-seg" id="b1"></div>
        <div class="bar-seg" id="b2"></div>
        <div class="bar-seg" id="b3"></div>
      </div>
    </div>


    <!-- Criteria -->
    <div class="criteria-title">Checklist</div>
    <div class="criteria-grid" id="critGrid"></div>

    <!-- Tip -->
    <div class="tip" id="tipBox">Start typing above — live feedback will appear here.</div>

    <!-- Generate strong password -->
    <button class="gen-btn" id="genBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
      Generate a strong password for me
    </button>
  </div>

  <footer class="footer">
    All analysis is done <span>locally in your browser</span> — your password never leaves this page.
  </footer>

</div>

<script>
  const CRITERIA = [
    { id:'len8',    label:'8+ characters',        test: p => p.length >= 8 },
    { id:'len12',   label:'12+ characters',        test: p => p.length >= 12 },
    { id:'upper',   label:'Uppercase (A–Z)',        test: p => /[A-Z]/.test(p) },
    { id:'lower',   label:'Lowercase (a–z)',        test: p => /[a-z]/.test(p) },
    { id:'digit',   label:'Number (0–9)',           test: p => /[0-9]/.test(p) },
    { id:'symbol',  label:'Special char (!@#…)',   test: p => /[^A-Za-z0-9]/.test(p) },
    { id:'common',  label:'Not a common password', test: p => !['password','123456','qwerty','abc123','letmein','admin','welcome','monkey','dragon','iloveyou','sunshine'].includes(p.toLowerCase()) }
  ];

  const LEVELS = [
    { label:'Weak',       color:'#ff5a5a' },
    { label:'Fair',       color:'#ffb547' },
    { label:'Good',       color:'#4dffb0' },
    { label:'Very strong',color:'#2dffd6' }
  ];

  const TIPS = [
    'Add uppercase, numbers & symbols. Aim for 12+ characters.',
    'Getting better! Try adding symbols or making it longer.',
    'Nice work — a few more characters would make it excellent.',
    'Outstanding! This password is extremely hard to crack.'
  ];

  // Build criteria UI
  const grid = document.getElementById('critGrid');
  CRITERIA.forEach(c => {
    const div = document.createElement('div');
    div.className = 'crit fail';
    div.id = 'c_' + c.id;
    div.innerHTML = `<div class="crit-check"><svg viewBox="0 0 10 10" fill="none" stroke="#4dffb0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1.5,5 4,7.5 8.5,2"/></svg></div><span>${c.label}</span>`;
    grid.appendChild(div);
  });

  function entropy(p) {
    let pool = 0;
    if (/[a-z]/.test(p)) pool += 26;
    if (/[A-Z]/.test(p)) pool += 26;
    if (/[0-9]/.test(p)) pool += 10;
    if (/[^A-Za-z0-9]/.test(p)) pool += 32;
    return pool ? Math.round(p.length * Math.log2(pool)) : 0;
  }

  function crackTime(bits) {
    if (!bits) return '—';
    const s = Math.pow(2, bits) / 1e10;
    if (s < 1) return 'instant';
    if (s < 60) return Math.round(s) + 's';
    if (s < 3600) return Math.round(s/60) + ' min';
    if (s < 86400) return Math.round(s/3600) + ' hrs';
    if (s < 31536000) return Math.round(s/86400) + ' days';
    if (s < 3.154e9) return Math.round(s/31536000) + ' yrs';
    return '∞ centuries';
  }

  function getLevel(passed, bits) {
    if (passed <= 2) return 0;
    if (passed <= 4) return 1;
    if (passed <= 5 || bits < 55) return 2;
    return 3;
  }

  function update() {
    const p = document.getElementById('pwd').value;
    const bits = entropy(p);
    let passed = 0;

    CRITERIA.forEach(c => {
      const ok = p.length > 0 && c.test(p);
      if (ok) passed++;
      const el = document.getElementById('c_' + c.id);
      el.className = 'crit ' + (ok ? 'pass' : 'fail');
    });

    document.getElementById('bitLabel').textContent = bits + ' bits entropy';

    if (!p.length) {
      for (let i = 0; i < 4; i++) {
        const b = document.getElementById('b'+i);
        b.style.background = '';
        b.classList.remove('lit');
      }
      document.getElementById('strLabel').style.color = 'var(--muted)';
      document.getElementById('strLabel').textContent = 'Waiting…';
      document.getElementById('tipBox').textContent = 'Start typing above — live feedback will appear here.';
      return;
    }

    const lvl = getLevel(passed, bits);
    const { label, color } = LEVELS[lvl];

    for (let i = 0; i < 4; i++) {
      const b = document.getElementById('b'+i);
      if (i <= lvl) { b.style.background = color; b.classList.add('lit'); }
      else { b.style.background = ''; b.classList.remove('lit'); }
    }

    const sl = document.getElementById('strLabel');
    sl.textContent = label;
    sl.style.color = color;

    const tip = document.getElementById('tipBox');
    tip.style.borderLeftColor = color;
    tip.textContent = TIPS[lvl];
  }

  document.getElementById('pwd').addEventListener('input', update);

  // Eye toggle
  let shown = false;
  document.getElementById('eyeBtn').addEventListener('click', () => {
    shown = !shown;
    const inp = document.getElementById('pwd');
    inp.type = shown ? 'text' : 'password';
    const icon = document.getElementById('eyeIcon');
    icon.innerHTML = shown
      ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  // Generate strong password
  function generatePassword(length = 18) {
    const upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    const lower = 'abcdefghjkmnpqrstuvwxyz';
    const digits = '23456789';
    const syms = '!@#$%^&*-_+=?';
    const all = upper + lower + digits + syms;
    let pwd = [
      upper[Math.floor(Math.random()*upper.length)],
      upper[Math.floor(Math.random()*upper.length)],
      lower[Math.floor(Math.random()*lower.length)],
      lower[Math.floor(Math.random()*lower.length)],
      digits[Math.floor(Math.random()*digits.length)],
      syms[Math.floor(Math.random()*syms.length)],
      syms[Math.floor(Math.random()*syms.length)],
    ];
    for (let i = pwd.length; i < length; i++) {
      pwd.push(all[Math.floor(Math.random()*all.length)]);
    }
    return pwd.sort(() => Math.random() - 0.5).join('');
  }

  document.getElementById('genBtn').addEventListener('click', () => {
    const p = generatePassword();
    const inp = document.getElementById('pwd');
    inp.value = p;
    inp.type = 'text';
    shown = true;
    const icon = document.getElementById('eyeIcon');
    icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    update();
  });
</script>
</body>
</html>
